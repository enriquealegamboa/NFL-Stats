name: Apply database migrations

# Run whenever a migration file changes on the main branch.
on:
  push:
    branches: [main]
    paths:
      - 'database/migrations/**'
      - 'scripts/run_migrations.sh'
  # Lets you also trigger it by hand from the GitHub "Actions" tab.
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Apply new migrations to Supabase
        env:
          # Set this in: repo Settings -> Secrets and variables -> Actions
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bash scripts/run_migrations.sh
