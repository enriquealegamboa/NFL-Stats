server.port=${PORT:8080}

# --- Supabase Postgres (Spring Data JPA) ---------------------------------
# Fill these in (locally via .env-style env vars, on Railway via service vars)
# to enable database access. Get the JDBC URL from the Supabase dashboard:
# Project Settings -> Database -> Connection string -> JDBC.
spring.datasource.url=${SUPABASE_DB_URL:}
spring.datasource.username=${SUPABASE_DB_USER:}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}

# The schema is owned by database/migrations/*.sql — never let Hibernate
# create or alter tables.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# No @Entity classes or DB credentials exist yet, so skip database
# auto-configuration. This lets the app (and the /health check Railway uses)
# start without a database, matching the old TypeScript server's behavior.
# Delete this line once you add your first JPA entity + DB credentials.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
