server.port=${PORT:8080}

# --- Supabase Postgres (Spring Data JPA) ---------------------------------
spring.datasource.url=${SUPABASE_DB_URL:}
spring.datasource.username=${SUPABASE_DB_USER:}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}

# The schema is owned by database/migrations/*.sql — never let Hibernate
# create or alter tables.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# --- Daily puzzle ---
app.daily.max-guesses=8
app.daily.zone=America/New_York
app.daily.stat-categories=conference,division,season,total_points,net_passing_yards,rushing_yards,turnovers,penalty_yards,total_touchdowns